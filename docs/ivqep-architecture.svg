<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360" role="img" aria-label="IVQEP end-to-end architecture">
  <title>IVQEP end-to-end architecture</title>
  <defs>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 16px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #334155; }
      .box { rx: 14; ry: 14; stroke: #334155; stroke-width: 2; }
      .arrow { stroke: #0f172a; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <text x="540" y="42" text-anchor="middle" class="title">IVQEP End-to-End Pipeline</text>

  <rect x="40" y="90" width="190" height="150" class="box" fill="#dbeafe" />
  <text x="135" y="130" text-anchor="middle" class="label">Input Video</text>
  <text x="135" y="158" text-anchor="middle" class="text">Low-light frames</text>
  <text x="135" y="180" text-anchor="middle" class="text">read by OpenCV</text>

  <rect x="270" y="70" width="290" height="190" class="box" fill="#dcfce7" />
  <text x="415" y="110" text-anchor="middle" class="label">Frame Preprocessing</text>
  <text x="415" y="140" text-anchor="middle" class="text">1) LAB conversion</text>
  <text x="415" y="162" text-anchor="middle" class="text">2) CLAHE on L channel</text>
  <text x="415" y="184" text-anchor="middle" class="text">3) Non-local-means denoise</text>
  <text x="415" y="212" text-anchor="middle" class="text">Fast baseline enhancement</text>

  <rect x="600" y="90" width="200" height="150" class="box" fill="#fef3c7" />
  <text x="700" y="130" text-anchor="middle" class="label">Optional DnCNN</text>
  <text x="700" y="158" text-anchor="middle" class="text">Residual CNN</text>
  <text x="700" y="180" text-anchor="middle" class="text">for deeper denoising</text>

  <rect x="840" y="60" width="210" height="90" class="box" fill="#fee2e2" />
  <text x="945" y="95" text-anchor="middle" class="label">Output Video</text>
  <text x="945" y="120" text-anchor="middle" class="text">Enhanced frames</text>

  <rect x="840" y="180" width="210" height="90" class="box" fill="#ede9fe" />
  <text x="945" y="215" text-anchor="middle" class="label">Observations</text>
  <text x="945" y="240" text-anchor="middle" class="text">PSNR / SSIM summary</text>

  <path d="M230 165 L270 165" class="arrow" />
  <path d="M560 165 L600 165" class="arrow" />
  <path d="M800 120 L840 105" class="arrow" />
  <path d="M800 210 L840 225" class="arrow" />

  <text x="700" y="285" text-anchor="middle" class="text">Frame-by-frame streaming pipeline for long videos</text>
</svg>
